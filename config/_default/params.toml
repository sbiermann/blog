mainSections   = ["post"]
rssFullContent = true
favicon        = "img/avatar.png"

[footer]
    since = 2013
    customText = "<a href='/transparenzhinweise/'>Transparenzhinweise</a> | <a href='/impressum/'>Impressum</a> | <a href='/datenschutz/'>Datenschutzerklärung</a>"

[sidebar]
    emoji    = "⚙️"
    subtitle = "Smart Home, 3D-Druck, IoT, Linux, Balkon-Solar und Maker-Projekte"
    avatar   = "img/avatar.png"

[article]
    [article.license]
        enabled = true
        default = "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

[comments]
    # See complete configuration in config/_default/params.toml
    enabled  = true
    provider = "giscus"

    [comments.giscus]
        repo             = "sbiermann/blog"
        repoID           = "R_kgDOSmWmwQ"
        category         = "General"
        categoryID       = "DIC_kwDOSmWmwc4C9u0X"
        mapping          = "title"
        lightTheme       = "light"
        darkTheme        = "dark_dimmed"
        reactionsEnabled = 1
        emitMetadata     = 0
        inputPosition    = "bottom"
        lang             = "de"
        strict           = 0
        loading          = "lazy"

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
    enabled = false

    [cookies.categories]
        analytics  = true
        functional = true
